version: '3.8'

services:
  db:
    image: mysql:5.7
    container_name: chaveiro_db
    restart: always
    environment:
      MYSQL_DATABASE: wp_chaveiro
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    container_name: chaveiro_wp
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_pass
      WORDPRESS_DB_NAME: wp_chaveiro
    volumes:
      - .:/var/www/html/wp-content/themes/amac

volumes:
  db_data: